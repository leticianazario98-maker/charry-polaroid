<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Most Loved Edit</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f7f1ef;
  overflow-x:hidden;
}

.page{
  display:none;
  min-height:100vh;
}

.page.active{
  display:block;
}

/* CAPA */

.cover{
  min-height:100vh;
  background:url("./capa.jpg") center/cover no-repeat;
  position:relative;
}

.cover button{
  position:absolute;
  left:50%;
  bottom:10%;
  transform:translateX(-50%);
  width:260px;
  height:58px;
  border:none;
  border-radius:50px;
  background:#8b0016;
  color:white;
  letter-spacing:3px;
  font-size:12px;
  cursor:pointer;
}

/* ESCOLHA */

.choice{
  padding:70px 20px;
  background:#f7f1ef;
  text-align:center;
}

.choice h1{
  font-size:64px;
  font-weight:300;
  margin-bottom:60px;
}

.frames{
  display:flex;
  justify-content:center;
  gap:35px;
  flex-wrap:wrap;
}

.frame-option{
  width:180px;
  cursor:pointer;
  transition:.3s;
  border-radius:25px;
  padding:10px;
}

.frame-option.active{
  transform:scale(1.08);
}

.frame-option img{
  width:100%;
  display:block;
}

.btn{
  margin-top:50px;
  width:260px;
  height:58px;
  border:none;
  border-radius:50px;
  background:#8b0016;
  color:white;
  letter-spacing:4px;
  font-size:12px;
  cursor:pointer;
}

/* EDITOR */

.editor{
  background:url("./pagina.jpg") center/cover no-repeat;
  padding:40px 20px;
}

.editor-box{
  max-width:1250px;
  margin:auto;
  display:grid;
  grid-template-columns:360px 1fr;
  gap:40px;
  align-items:center;
}

.panel{
  background:rgba(255,255,255,.95);
  padding:35px;
  border-radius:30px;
}

.panel h1{
  font-size:42px;
  font-weight:300;
  margin-bottom:20px;
}

.panel p{
  line-height:1.5;
  margin-bottom:20px;
}

.slot-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:20px;
}

.slot-buttons.one{
  grid-template-columns:1fr;
}

.slot-btn{
  height:42px;
  border-radius:50px;
  border:1px solid #8b0016;
  background:white;
  color:#8b0016;
  cursor:pointer;
}

.slot-btn.active{
  background:#8b0016;
  color:white;
}

.upload{
  width:100%;
  height:54px;
  border-radius:50px;
  background:#8b0016;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  letter-spacing:2px;
  cursor:pointer;
  margin-bottom:25px;
}

.upload input{
  display:none;
}

.zoom{
  width:100%;
  accent-color:#8b0016;
}

.zoom-buttons{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.zoom-buttons button{
  flex:1;
  height:44px;
  border-radius:50px;
  border:1px solid #8b0016;
  background:white;
  color:#8b0016;
  cursor:pointer;
}

.preview{
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  max-width:100%;
  max-height:80vh;
}

/* RESULTADO */

.result{
  background:url("./final.jpg") center/cover no-repeat;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:25px;
  padding:40px;
}

.result.active{
  display:flex;
}

.result-buttons{
  display:flex;
  gap:15px;
}

.result-buttons button{
  width:180px;
  height:52px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  letter-spacing:3px;
}

.download{
  background:#8b0016;
  color:white;
}

.print{
  background:white;
  color:#8b0016;
}

@media(max-width:900px){

  .choice h1{
    font-size:42px;
  }

  .editor-box{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<!-- CAPA -->

<section class="page cover active" id="coverPage">

<button onclick="goToChoice()">
CRIE SUA POLAROID
</button>

</section>

<!-- ESCOLHA -->

<section class="page choice" id="choicePage">

<h1>Escolha sua polaroid</h1>

<div class="frames">

<div class="frame-option"
onclick="selectFrame(this,'polaroid1.png','p1')">
<img src="./polaroid1.png">
</div>

<div class="frame-option"
onclick="selectFrame(this,'polaroid2.png','p2')">
<img src="./polaroid2.png">
</div>

<div class="frame-option"
onclick="selectFrame(this,'polaroid3.png','p3')">
<img src="./polaroid3.png">
</div>

<div class="frame-option"
onclick="selectFrame(this,'polaroid4.png','p4')">
<img src="./polaroid4.png">
</div>

</div>

<button class="btn"
onclick="goToEditor()">
CONTINUAR
</button>

</section>

<!-- EDITOR -->

<section class="page editor" id="editorPage">

<div class="editor-box">

<div class="panel">

<h1>Ajuste sua foto</h1>

<p id="photoText">
Escolha uma foto para cada quadradinho.
</p>

<div class="slot-buttons"
id="slotButtons"></div>

<label class="upload">

INSERIR FOTO

<input type="file"
id="fileInput"
accept="image/*">

</label>

<input type="range"
min="1"
max="4"
step="0.01"
value="1"
class="zoom"
id="zoomRange">

<div class="zoom-buttons">

<button onclick="changeZoom(-0.1)">
- zoom
</button>

<button onclick="changeZoom(0.1)">
+ zoom
</button>

</div>

<p style="margin-top:20px;">
Arraste a imagem dentro do quadro para ajustar.
</p>

<button class="btn"
onclick="finish()">
FINALIZAR
</button>

</div>

<div class="preview">

<canvas id="canvas"
width="900"
height="1300"></canvas>

</div>

</div>

</section>

<!-- RESULTADO -->

<section class="page result"
id="resultPage">

<canvas id="resultCanvas"
width="900"
height="1300"></canvas>

<div class="result-buttons">

<button class="download"
onclick="downloadImage()">
BAIXAR
</button>

<button class="print"
onclick="printImage()">
IMPRIMIR
</button>

</div>

</section>

<script>

const coverPage =
document.getElementById("coverPage");

const choicePage =
document.getElementById("choicePage");

const editorPage =
document.getElementById("editorPage");

const resultPage =
document.getElementById("resultPage");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const resultCanvas =
document.getElementById("resultCanvas");

const rctx =
resultCanvas.getContext("2d");

const fileInput =
document.getElementById("fileInput");

const zoomRange =
document.getElementById("zoomRange");

const slotButtons =
document.getElementById("slotButtons");

const photoText =
document.getElementById("photoText");

let selectedFrame = "";
let selectedType = "";

let frameImage = new Image();

let activeSlot = 0;

let photos = [];

let dragging = false;
let lastX = 0;
let lastY = 0;

function show(page){

document.querySelectorAll(".page")
.forEach(p => p.classList.remove("active"));

page.classList.add("active");

}

function goToChoice(){
show(choicePage);
}

function selectFrame(el,frame,type){

document.querySelectorAll(".frame-option")
.forEach(i => i.classList.remove("active"));

el.classList.add("active");

selectedFrame = frame;
selectedType = type;

}

function goToEditor(){

if(!selectedFrame){
alert("Escolha uma polaroid");
return;
}

frameImage.src = "./" + selectedFrame;

frameImage.onload = () => {

setupPhotos();
buildButtons();
draw();

show(editorPage);

};

}

function getSlots(){

if(selectedType === "p1"){

return [
{x:150,y:140,w:600,h:850}
];

}

if(selectedType === "p2"){

return [
{x:150,y:140,w:600,h:850}
];

}

if(selectedType === "p3"){

return [

{x:170,y:150,w:560,h:250},

{x:170,y:450,w:560,h:250},

{x:170,y:750,w:560,h:250}

];

}

if(selectedType === "p4"){

return [

{x:170,y:110,w:560,h:220},

{x:170,y:390,w:560,h:220},

{x:170,y:670,w:560,h:220},

{x:170,y:950,w:560,h:220}

];

}

return [];

}

function setupPhotos(){

const total =
getSlots().length;

photos =
Array.from({length:total},
() => ({
img:null,
x:0,
y:0,
zoom:1
}));

activeSlot = 0;

zoomRange.value = 1;

}

function buildButtons(){

slotButtons.innerHTML = "";

slotButtons.classList.toggle(
"one",
photos.length === 1
);

photos.forEach((_,i)=>{

const btn =
document.createElement("button");

btn.className =
"slot-btn" +
(i===activeSlot ? " active":"");

btn.innerText =
photos.length === 1
? "Foto"
: "Foto " + (i+1);

btn.onclick = ()=>{

activeSlot = i;

zoomRange.value =
photos[i].zoom;

buildButtons();

draw();

};

slotButtons.appendChild(btn);

});

}

fileInput.addEventListener("change",e=>{

const file = e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = ()=>{

const img =
new Image();

img.onload = ()=>{

photos[activeSlot] = {
img,
x:0,
y:0,
zoom:1
};

fitImage(activeSlot);

draw();

};

img.src = reader.result;

};

reader.readAsDataURL(file);

});

function fitImage(index){

const slot =
getSlots()[index];

const item =
photos[index];

const scale =
Math.max(
slot.w / item.img.width,
slot.h / item.img.height
);

const w =
item.img.width *
scale *
item.zoom;

const h =
item.img.height *
scale *
item.zoom;

item.x =
slot.x + (slot.w - w)/2;

item.y =
slot.y + (slot.h - h)/2;

}

zoomRange.addEventListener("input",()=>{

const item =
photos[activeSlot];

if(!item.img) return;

item.zoom =
parseFloat(zoomRange.value);

fitImage(activeSlot);

draw();

});

function changeZoom(value){

zoomRange.value =
Math.max(
1,
Math.min(
4,
parseFloat(zoomRange.value)+value
)
);

zoomRange.dispatchEvent(
new Event("input")
);

}

function draw(targetCtx = ctx){

targetCtx.clearRect(
0,0,
canvas.width,
canvas.height
);

const slots =
getSlots();

slots.forEach((slot,index)=>{

const item =
photos[index];

targetCtx.fillStyle = "white";

targetCtx.fillRect(
slot.x,
slot.y,
slot.w,
slot.h
);

if(item.img){

const scale =
Math.max(
slot.w / item.img.width,
slot.h / item.img.height
);

const w =
item.img.width *
scale *
item.zoom;

const h =
item.img.height *
scale *
item.zoom;

targetCtx.save();

targetCtx.beginPath();

targetCtx.rect(
slot.x,
slot.y,
slot.w,
slot.h
);

targetCtx.clip();

targetCtx.drawImage(
item.img,
item.x,
item.y,
w,
h
);

targetCtx.restore();

}

});

targetCtx.drawImage(
frameImage,
0,
0,
canvas.width,
canvas.height
);

}

canvas.addEventListener(
"mousedown",
startDrag
);

window.addEventListener(
"mousemove",
drag
);

window.addEventListener(
"mouseup",
endDrag
);

function getMouse(e){

const rect =
canvas.getBoundingClientRect();

return {

x:
(e.clientX - rect.left)
*
(canvas.width / rect.width),

y:
(e.clientY - rect.top)
*
(canvas.height / rect.height)

};

}

function startDrag(e){

const p =
getMouse(e);

const item =
photos[activeSlot];

if(!item.img) return;

dragging = true;

lastX = p.x;
lastY = p.y;

}

function drag(e){

if(!dragging) return;

const p =
getMouse(e);

const item =
photos[activeSlot];

item.x += p.x - lastX;
item.y += p.y - lastY;

lastX = p.x;
lastY = p.y;

draw();

}

function endDrag(){
dragging = false;
}

function finish(){

resultCanvas.width =
canvas.width;

resultCanvas.height =
canvas.height;

draw(rctx);

show(resultPage);

}

function downloadImage(){

const link =
document.createElement("a");

link.download =
"polaroid-charry.png";

link.href =
resultCanvas.toDataURL("image/png");

link.click();

}

function printImage(){

const data =
resultCanvas.toDataURL("image/png");

const win =
window.open("");

win.document.write(
`<img src="${data}" style="width:100%">`
);

win.document.close();

win.print();

}

</script>

</body>
</html>
